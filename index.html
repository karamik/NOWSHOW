<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOWSHOWBOT · 21 Characters · Interactive Show</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d0b1a 0%, #1a1a2f 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.15);
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff7b7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav a {
            color: #b0b0b0;
            text-decoration: none;
            margin-left: 30px;
            transition: color 0.2s;
            font-weight: 500;
        }

        .nav a:hover {
            color: #ffd700;
        }

        .telegram-btn {
            background: #2AABEE;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .telegram-btn:hover {
            transform: scale(1.05);
        }

        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: radial-gradient(circle at 50% 30%, rgba(255,215,0,0.1), transparent 60%);
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #ffd700, #ff7b7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #c0c0c0;
            max-width: 600px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 30px 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #ffd700;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 14px;
            text-transform: uppercase;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff7b7b);
            color: #0d0b1a;
            border-color: transparent;
        }

        .characters-section {
            padding: 20px 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .character-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .character-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 20px 30px rgba(255,215,0,0.15);
            background: rgba(255,255,255,0.07);
        }

        .character-emoji {
            font-size: 64px;
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .character-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .character-category {
            font-size: 12px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .character-tagline {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.4;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #606060;
            border-top: 1px solid rgba(255,215,0,0.1);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 40px;
            }
            .header {
                padding: 20px;
            }
            .nav a {
                margin-left: 15px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">⚡ NOWSHOWBOT</div>
        <div class="nav">
            <a href="#characters">Characters</a>
            <a href="#about">About</a>
            <a href="#price">Price</a>
        </div>
        <a href="https://t.me/NOWSHOW_BOT" class="telegram-btn" target="_blank">
            🤖 Open in Telegram
        </a>
    </header>

    <section class="hero">
        <h1>
            <span>21 character</span><br>
            infinite conversations
        </h1>
        <p>
            Talk with politicians, philosophers, musicians, and mystics.<br>
            First hour — free. Then 10 stars/day.
        </p>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">21</div>
                <div class="stat-label">characters</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">∞</div>
                <div class="stat-label">stories</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">1h</div>
                <div class="stat-label">free trial</div>
            </div>
        </div>
    </section>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="politics">Politics</button>
        <button class="filter-btn" data-filter="philosophy">Philosophy</button>
        <button class="filter-btn" data-filter="culture">Culture</button>
        <button class="filter-btn" data-filter="mystic">Mystic</button>
        <button class="filter-btn" data-filter="beauty">Beauty</button>
    </div>

    <section class="characters-section" id="characters">
        <div class="characters-grid" id="charactersGrid"></div>
    </section>

    <footer class="footer">
        © 2026 NOWSHOWBOT · 18+ · Built on Telegram
    </footer>

    <script>
        const characters = [
            { id: 'lenin', name: 'Lenin', emoji: '👨', category: 'politics', tagline: '"Comrade, this is class struggle!"' },
            { id: 'stalin', name: 'Stalin', emoji: '👨‍🦰', category: 'politics', tagline: '"Cadres decide everything, comrade."' },
            { id: 'zhirinovsky', name: 'Zhirinovsky', emoji: '🗣️', category: 'politics', tagline: '"Boots in the Indian Ocean!"' },
            { id: 'churchill', name: 'Churchill', emoji: '🧐', category: 'politics', tagline: '"We shall fight on the beaches."' },
            { id: 'napoleon', name: 'Napoleon', emoji: '🎖️', category: 'politics', tagline: '"Greatness knows no bounds."' },
            { id: 'nietzsche', name: 'Nietzsche', emoji: '🧠', category: 'philosophy', tagline: '"God is dead. And you?"' },
            { id: 'kant', name: 'Kant', emoji: '📚', category: 'philosophy', tagline: '"Categorical imperative, however."' },
            { id: 'hegel', name: 'Hegel', emoji: '📖', category: 'philosophy', tagline: '"Dialectics will save us."' },
            { id: 'einstein', name: 'Einstein', emoji: '🧪', category: 'philosophy', tagline: '"Everything is relative."' },
            { id: 'shivananda', name: 'Swami Shivananda', emoji: '🧘', category: 'philosophy', tagline: '"Karma is watching."' },
            { id: 'vysotsky', name: 'Vysotsky', emoji: '🎸', category: 'culture', tagline: '"Better mountains only mountains."' },
            { id: 'tsoi', name: 'Tsoi', emoji: '🎤', category: 'culture', tagline: '"Change!"' },
            { id: 'pugacheva', name: 'Pugacheva', emoji: '👩', category: 'culture', tagline: '"A million scarlet roses."' },
            { id: 'jackson', name: 'Michael Jackson', emoji: '💃', category: 'culture', tagline: '"Hee-hee! Shamone!"' },
            { id: 'chaplin', name: 'Chaplin', emoji: '🎭', category: 'culture', tagline: '... (silent but funny)' },
            { id: 'dzhigurda', name: 'Dzhigurda', emoji: '🎭', category: 'culture', tagline: '"I am cosmic!"' },
            { id: 'moiseev', name: 'Moiseev', emoji: '🕺', category: 'culture', tagline: '"Baby, this is show!"' },
            { id: 'dracula', name: 'Dracula', emoji: '🦇', category: 'mystic', tagline: '"Blood... is life..."' },
            { id: 'linzi', name: 'Lin Tzu', emoji: '🀄', category: 'mystic', tagline: '"Listen to the silence..."' },
            { id: 'blonde', name: 'Beautiful Blonde', emoji: '👩‍🦳', category: 'beauty', tagline: '"Honey, these are new shoes!"' },
            { id: 'mulatto', name: 'Beautiful Mulatto', emoji: '👩🏽', category: 'beauty', tagline: '"Dance, amigo!"' },
            { id: 'mavrodi', name: 'Mavrodi', emoji: '💰', category: 'politics', tagline: '"Wanna earn? Pyramid!"' }
        ];

        const charactersGrid = document.getElementById('charactersGrid');
        const filterButtons = document.querySelectorAll('.filter-btn');

        function renderCharacters(filter = 'all') {
            const filtered = filter === 'all' 
                ? characters 
                : characters.filter(c => c.category === filter);
            
            charactersGrid.innerHTML = filtered.map(char => `
                <div class="character-card" data-id="${char.id}">
                    <div class="character-emoji">${char.emoji}</div>
                    <div class="character-name">${char.name}</div>
                    <div class="character-category">${char.category}</div>
                    <div class="character-tagline">${char.tagline}</div>
                </div>
            `).join('');
        }

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCharacters(btn.dataset.filter);
            });
        });

        renderCharacters();

        charactersGrid.addEventListener('click', (e) => {
            const card = e.target.closest('.character-card');
            if (card) {
                window.open('https://t.me/NOWSHOW_BOT', '_blank');
            }
        });
    </script>
</body>
</html>
